name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      # Blocks CI (red) if a high/critical-severity prod-dependency CVE appears.
      # --omit=dev: dev-only tooling vulns don't gate releases. Moderate/low are
      # surfaced by Dependabot alerts (now enabled), not the gate. Lower
      # --audit-level if moderates should also block.
      - name: Security audit (blocking on high/critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Test
        run: npm test --if-present
