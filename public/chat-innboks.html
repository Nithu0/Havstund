<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Havstund — Chat-innboks (intern)</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .topbar{background:var(--sea-deep);color:#fff;padding:16px 0}
  .topbar .wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .topbar h1{font-size:22px;color:#fff}
  .topbar a{margin-left:auto;color:#cfe2e7;font-size:14px}

  .inbox{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;
    height:calc(100vh - 150px);min-height:480px}

  /* trådliste */
  .threads{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;height:100%}
  .threads .hd{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;color:var(--sea-deep);
    display:flex;align-items:center;gap:8px}
  .threads .list{flex:1;overflow-y:auto}
  .tr{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
  .tr:hover{background:#fffaf1}
  .tr.active{background:#eef7f8;border-left:3px solid var(--turq);padding-left:13px}
  .tr .navn{font-weight:700;font-size:14px;color:var(--sea-deep);display:flex;align-items:center;gap:6px}
  .tr .prev{font-size:13px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tr .tid{font-size:11px;color:var(--muted);margin-top:3px}
  .pill{font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;font-weight:700}
  .pill.apen{background:#e7f5f6;color:var(--teal)}
  .pill.ansatt{background:#fbe9d8;color:var(--clay-d)}
  .pill.lukket{background:#eee;color:var(--muted)}
  .nynyatt{width:9px;height:9px;border-radius:50%;background:var(--clay);display:inline-block}

  /* samtale */
  .conv{background:#fff;border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;height:100%}
  .conv .hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .conv .hd .navn{font-weight:800;color:var(--sea-deep);font-size:16px}
  .conv .hd .epost{font-size:13px;color:var(--muted)}
  .conv .hd .sp{flex:1}
  .conv .msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:#fbfbf8}
  .m{max-width:74%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .m .who{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:3px}
  .m.kunde{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .m.ai{align-self:flex-end;background:#eef7f8;color:var(--ink);border-bottom-right-radius:4px}
  .m.ansatt{align-self:flex-end;background:var(--sea);color:#fff;border-bottom-right-radius:4px}
  .conv .reply{display:flex;gap:10px;padding:12px;border-top:1px solid var(--line);background:#fffaf1}
  .conv .reply input{flex:1}
  .tom{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;text-align:center;padding:30px}
  .alert{font-size:13px;background:#fbe9d8;color:var(--clay-d);padding:6px 14px;border-bottom:1px solid var(--line)}
  @media(max-width:820px){.inbox{grid-template-columns:1fr;height:auto}.threads{height:300px}.conv{height:60vh}}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <h1>Havstund — Chat-innboks</h1>
    <a href="index.html">← Tilbake til nettsiden</a>
  </div>
</div>

<div class="wrap" style="padding-top:20px;padding-bottom:30px">
  <div class="inbox">

    <!-- Trådliste -->
    <div class="threads">
      <div class="hd">Samtaler <span class="sp" style="flex:1"></span>
        <button class="btn btn-ghost" id="oppdater" style="padding:6px 12px;font-size:13px">Oppdater</button>
      </div>
      <div class="list" id="trList">
        <div class="tom" style="padding:20px">Laster…</div>
      </div>
    </div>

    <!-- Samtale -->
    <div class="conv">
      <div class="hd" id="convHd" style="display:none">
        <div>
          <div class="navn" id="convNavn">—</div>
          <div class="epost" id="convEpost"></div>
        </div>
        <div class="sp"></div>
        <span class="pill" id="convStatus"></span>
        <button class="btn btn-primary" id="overta" style="padding:8px 14px;font-size:13px">Overta fra AI</button>
      </div>
      <div class="alert" id="convAlert" style="display:none"></div>
      <div class="msgs" id="convMsgs">
        <div class="tom">Velg en samtale fra listen til venstre for å se meldingene.</div>
      </div>
      <form class="reply" id="replyForm" style="display:none">
        <input type="text" id="replyInput" placeholder="Svar kunden…" autocomplete="off" maxlength="4000">
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/chat-innboks.js"></script>
</body>
</html>
